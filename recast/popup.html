<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta http-equiv="X-UA-Compatible" content="IE=edge" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<link href="reset.css"rel="stylesheet">
		<link rel="stylesheet" href="./popup.css" />
	</head>
<body>

	<header>
		<section id="welcome-header">
			<div id="welcome-top">
				<h1>Recast</h1>
				<div class="welcome-previews">
					<button class="preview-btn">Aa</button>
					<button class="preview-btn paper">Aa</button>
					<button class="preview-btn dark">Aa</button>
				</div>
				<button id="welcome-close">×</button>
			</div>
			<p id="welcome-desc">Choose your font, background, and save your favorite combos.</p>
		</section>
	</header>

	<main>
		<section class="font-section">
			<label>Font Family</label>
			<div class="fonts">
				<button class="font-card" data-font="Sans-serif">
					<span class="font-preview" style="font-family:'Inter', sans-serif;">Aa</span>
					<span class="font-label">Sans Serif</span>
				</button>
				<button class="font-card" data-font="Serif">
					<span class="font-preview" style="font-family: 'Times New Roman', serif;">Aa</span>
					<span class="font-label">Serif</span>
				</button>
				<button class="font-card" data-font="Mono">
					<span class="font-preview" style="font-family: 'Roboto Mono', monospace;">Aa</span>
					<span class="font-label">Monospace</span>
				</button>
			</div>
			<p id="font-description"></p>
		</section>

		<section class="bg-color">
			<label>Background</label>
				<div class="bg-swatches" id="bg-swatches">
					<!-- https://developer.mozilla.org/en-US/docs/Web/HTML/How_to/Use_data_attributes -->
					<!-- needed a way to store the hex color value on each swatch button so applyBackground and savePreset could read it back when clicked -->
					<!-- learned that data-color lets me attach the hex value directly to the element so JavaScript can access it with dataset.color without needing a separate variable, easier shortcut for me -->
					<button class="swatch font-card" data-color="#FAF9F6" style="background:#FAF9F6;" title="Light">
						<span class="font-label" style="color: #2c2c2c;">Light</span>
					</button>
					<button class="swatch font-card" data-color="#2c2c2c" style="background:#2c2c2c;" title="Dark">
						<span class="font-label" style="color: #FAF9F6;">Dark</span>
					</button>
					<button class="swatch font-card" data-color="#F5F0E8" style="background:#F5F0E8;" title="Paper">
						<span class="font-label" style="color: #2c2c2c;">Paper</span>
					</button>
				</div>
				<p id="bg-description"></p>
		</section>

			<section class="preset-section">
				<p class="preset-title">Presets</p>
				<form class="preset-form"> 
					<!-- taken and changed from forms-params-storage tutorial -->
					<!-- https://github.com/typography-interaction-2526/forms-params-storage -->
					<!-- Different types can control what is allowed: https://developer.mozilla.org/en-US/docs/Web/HTML/Element/input -->
					<input id="pre" name="preset" placeholder="Preset name" required type="text">
					<!-- https://developer.mozilla.org/en-US/docs/Web/HTML/Reference/Elements/input/submit -->
					<!-- based on michaels feedback using input for user text entry and submit for handling save action -->
					<button type="submit">Save</button>
				</form>
				<ul id="preset-list"></ul>
			</section>

			<button id="resetBtn">Clear</button>
		</main>

			<script src="script.js"></script>
			<script src="background.js"></script>
			<script src="presets.js"></script>

</body>
</html>
